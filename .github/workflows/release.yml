name: Release

# Publishes the Schemantic .NET tool to NuGet when a version tag is pushed.
# The package version is taken from the tag: tag `v0.5.0` -> package `0.5.0`.
#
# Auth uses nuget.org Trusted Publishing (OIDC) — no long-lived API key.
# Prerequisite (one-time): create a Trusted Publishing policy on nuget.org for
# package owner `ouzsrcm`, Repository Owner `ouzsrcm`, Repository `schemantic`,
# Workflow File `release.yml`. The `id-token: write` permission below is required.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack
        run: >-
          dotnet pack src/Schemantic.Cli/Schemantic.Cli.csproj
          --configuration Release
          -p:Version=${{ steps.version.outputs.version }}
          --output ./artifacts

      - name: NuGet login (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ouzsrcm

      - name: Push to NuGet
        run: >-
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
